{% extends 'base.html' %}

{% block title %}
تعديل العملة
{% endblock %}

{% block content %}

<div class="sales-form"><h2>تعديل العملة</h2><form method="POST"><div class="form-group">
    <label>رمز العملة</label>
    <input type="text"
           name="code"
           value="{{ currency['code'] }}"
           required>
</div>

<div class="form-group">
    <label>اسم العملة</label>
    <input type="text"
           name="name"
           value="{{ currency['name'] }}"
           required>
</div>

<div class="form-group">
    <label>سعر الصرف</label>
    <input type="number"
           step="0.01"
           name="rate"
           value="{{ currency['rate'] }}"
           required>
</div>

<button class="btn-save" type="submit">
    حفظ التعديل
</button>

</form></div>{% endblock %}
