{% extends 'base.html' %}

{% block title %}
المنصرفات
{% endblock %}

{% block content %}

<div class="sales-form"><h2>إضافة مصروف</h2>

<form method="POST">

    <div class="form-group">
        <label>اسم المصروف</label>
        <input type="text" name="title" required>
    </div>

    <div class="form-group">
        <label>المبلغ</label>
        <input type="number" step="0.01" name="amount" required>
    </div>

    <div class="form-group">
        <label>ملاحظات</label>
        <textarea name="notes"></textarea>
    </div>

    <button class="btn-save" type="submit">
        حفظ المصروف
    </button>

</form>

</div><div class="table-card"><h2>المنصرفات</h2>

<table>

    <tr>
        <th>#</th>
        <th>المصروف</th>
        <th>المبلغ</th>
        <th>الملاحظات</th>
        <th>التاريخ</th>
    </tr>

    {% for e in expenses %}

    <tr>
        <td>{{ e['id'] }}</td>
        <td>{{ e['title'] }}</td>
        <td>{{ e['amount']|money }}</td>
        <td>{{ e['notes'] }}</td>
        <td>{{ e['created_at'] }}</td>
    </tr>

    {% endfor %}

</table>

</div>{% endblock %}
